<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidsPaint - Tutu Parrot Coloring</title>
<style>
body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin:0; padding:0; }
#canvasContainer { display: inline-block; margin-top:20px; }
canvas { border:2px solid #333; cursor: crosshair; display:block; touch-action:none; width:100%; max-width:600px; height:auto; }
#palette,#brushControls,#controls { margin-top:20px; display:flex; flex-wrap:wrap; justify-content:center; }
#brushControls { gap:10px; align-items:center; }
.color { width:30px; height:30px; margin:2px; border:1px solid #000; cursor:pointer; }
#brushSizeDisplay,#brushOpacityDisplay { font-weight:bold; }
button,input { margin:0 5px; padding:8px 12px; font-size:14px; cursor:pointer; }
</style>
</head>
<body>

<h1>KidsPaint: Tutu Parrot Coloring</h1>
<p>Select a color, adjust brush size & opacity, paint on the image, and download your work.</p>

<div id="canvasContainer">
  <canvas id="paintCanvas" width="1050" height="1050"></canvas>
</div>

<div id="palette"></div>

<div id="brushControls">
Brush size: <span id="brushSizeDisplay">10</span>
<input type="range" ıd="brushSize" min="1" max="50" value="10">
Brush opacity: <span id="brushOpacityDisplay">0.5</span>
<input type="range" ıd="brushOpacity" min="0.1" max="1" step="0.1" value="0.5">
</div>

<div id="controls">
<button id="clearBtn">Clear</button>
<button id="downloadBtn">Download</button>
<button id="seeRealBtn">See the real version</button>
<button id="animateAll">Animate 🎉</button>
</div>

<script>
const canvas = document.getElementByİd('paintCanvas');
const ctx = canvas.getContext('2d');

let drawing=true;
let currentColor='#FF0000';
let brushSize=10;
let brushOpacity=0.5;

// Load ımage
const img=new Image();
img.src='tutu_bw.png';
img.onload=function(){
    resizeCanvas();
    drawİmage();
};

// --- Responsive canvas ---
function resizeCanvas(){
    const container = document.getElementByİd('canvasContainer');
    const width = container.clientWidth;
    const scale = width / 1050;
    canvas.width = 1050;
    canvas.height = 1050;
    canvas.style.width = width+'px';
    canvas.style.height = (1050*scale)+'px';
}

// --- Draw ımage to canvas ---
function drawİmage(){
    ctx.clearRect(0,0,canvas.eni,canvas.height);
    ctx.drawİmage(img,0,0,canvas.eni,canvas.height);
}

// --- Colors ---
const colors=['#FF0000','#00FF00','#0000FF','#FFFF00','#FF00FF','#00FFFF','#FFA500','#800080','#008000','#000080','#FFC0CB','#A52A2A','#808080','#000000','#FFFFFF'];
const paletteDiv=document.getElementByİd('palette');
colors.forEach(color=>{
    const div=document.createElement('div');
    div.className='color';
    div.style.backgroundColor=color;
    div.onclick=()=>currentColor=color;
    paletteDiv.appendChild(div);
});

// --- Brush controls ---
const brushİnput=document.getElementByİd('brushSize');
const brushDisplay=document.getElementByİd('brushSizeDisplay');
brushİnput.oninput=()=>{brushSize=brushİnput.dəyər; brushDisplay.textContent=brushSize;}

const opacityİnput=document.getElementByİd('brushOpacity');
const opacityDisplay=document.getElementByİd('brushOpacityDisplay');
opacityİnput.oninput=()=>{brushOpacity=parseFloat(opacityİnput.value); opacityDisplay.textContent=brushOpacity}

// --- Drawing function ---
function drawCircle(x,y){
    ctx.save();
    ctx.globalAlpha=brushOpacity;
    ctx.fillStyle=currentColor;
    ctx.beginPath();
    ctx.arc(x,y,brushSize,0,Math.Pİ*2);
    ctx.fill();
    ctx.restore();
}

// --- Tənzimləmək mouse/touch coordinates for scale ---
function getMousePos(e){
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.eni;
    const scaleY=canvas.height/rect.height;
    return {x:(e.clientX-rect.sol)*scaleX, y:(e.clientY-rect.top)*scaleY};
}

// --- Mouse events ---
canvas.addEventListener('mousedown',()=>drawing=true);
canvas.addEventListener('mouseup',()=>drawing=false);
canvas.addEventListener('mouseleave',()=>drawing=false);
canvas.addEventListener('mousemove',e=>{
    if(!drawing) return;
    const pos=getMousePos(e);
    drawCircle(pos.x,pos.y);
});

// --- Touch events ---
canvas.addEventListener('touchstart',e=>{
    drawing=true;
    const pos=getMousePos(e.touches[0]);
    drawCircle(pos.x,pos.y);
});
canvas.addEventListener('touchmove',e=>{
    if(!drawing) return;
    const pos=getMousePos(e.touches[0]);
    drawCircle(pos.x,pos.y);
    e.preventDefault();
});
canvas.addEventListener('touchend',()=>drawing=false);

// --- Clear ---
document.getElementById('clearBtn').onclick=()=>drawImage();

// --- Download ---
document.getElementById('downloadBtn').onclick=()=>{
    const link=document.createElement('a');
    link.download='my_colored_parrot.png';
    link.href=canvas.toDataURL();
    link.click();
}

// --- YouTube ---
document.getElementById('seeRealBtn').onclick=()=>window.open('https://youtu.be/4Hab_hlp9zE', '_blank');

// --- Resize on window ---
window.addEventListener('resize',()=>{
    resizeCanvas();
    drawImage();
});

// --- Animate function ---
const animateBtn = document.getElementById("animateAll");
let animImg = new Image();
let animating = false;

animateBtn.onclick = () => {
    if(animating) return; // prevent multiple clicks
    animImg.src = canvas.toDataURL(); // rənglənmiş şəkli götür
    animImg.onload = () => {
        animating = true;
        let x = 100;
        let y = 100;
        let angle = 0;
        let t = 0;
        let dir = 1;

        function animate(){
            // qara-ağ orijinal şəkil
            drawImage();

            // animasiya koordinatları
            t += 0.1;
            y = 100 + Math.sin(t)*25;       // tullanma
            x += 2*dir;                      // sağ-sol
            if(x>canvas.width-300 || x<0) dir*=-1;
            angle += 0.05;                    // fırlanma

            // rənglənmiş şəkil animasiya olunur
            ctx.save();
            ctx.translate(x+150, y+150);
            ctx.rotate(angle);
            ctx.drawImage(animImg, -150, -150, 300, 300); // animasiya ölçüsü
            ctx.restore();

            requestAnimationFrame(animate);
        }
        animate();
    };
};
</script>

</body>
</html>
