<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidsPaint - Cat Coloring</title>
<style>
body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin:0; padding:0; }

#canvasContainer {
    display: inline-block;
    position: relative; /* GIF üçün */
    margin-top:20px;
}

canvas {
    border:2px solid #333;
    cursor: crosshair;
    width: 100%; 
    max-width:600px; /* Desktop ölçüsü */
    height:auto;
    touch-action: none;
}

/* GIF sol aşağı künc */
#gifOverlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 150px; /* Desktop */
    height: auto;
    pointer-events: none;
    border: none;
    background: transparent;
}

#palette,#brushControls,#controls { margin-top:20px; display:flex; flex-wrap:wrap; justify-content:center; }
#brushControls { gap:10px; align-items:center; }
.color { width:30px; height:30px; margin:2px; border:1px solid #000; cursor:pointer; }
#brushSizeDisplay,#brushOpacityDisplay { font-weight:bold; }
button,input { margin:0 5px; padding:8px 12px; font-size:14px; cursor:pointer; }

/* Mobil üçün böyük görünüş */
@media screen and (max-width: 480px) {
    canvas {
        max-width: 95vw; /* ekranın 95%-i */
    }
    #gifOverlay {
        width: 110px; /* GIF mobil üçün kiçikləşdirildi */
    }
}
</style>
</head>
<body>

<h1>KidsPaint: Cat Coloring</h1>
<p>Select a color, adjust brush size & opacity, paint on the image, and download your work.</p>

<div id="canvasContainer">
  <canvas id="paintCanvas" width="1050" height="1050"></canvas>
  <img src="y2.gif" id="gifOverlay">
</div>

<div id="palette"></div>

<div id="brushControls">
Brush size: <span id="brushSizeDisplay">10</span>
<input type="range" id="brushSize" min="1" max="50" value="10">
Brush opacity: <span id="brushOpacityDisplay">0.5</span>
<input type="range" id="brushOpacity" min="0.1" max="1" step="0.1" value="0.5">
</div>

<div id="controls">
<button id="clearBtn">Clear</button>
<button id="downloadBtn">Download</button>
<button id="seeRealBtn">See the real version</button>
</div>

<script>
const canvas = document.getElementById('paintCanvas');
const ctx = canvas.getContext('2d');

let drawing=false;
let currentColor='#FF0000';
let brushSize=10;
let brushOpacity=0.5;

// Load image
const img=new Image();
img.src='cat.jpg';
img.onload=function(){
    resizeCanvas();
    drawImage();
};

// Responsive canvas
function resizeCanvas(){
    const container=document.getElementById('canvasContainer');
    const width=container.clientWidth;
    const scale=width/1050;
    canvas.width=1050;
    canvas.height=1050;
    canvas.style.width=width+'px';
    canvas.style.height=(1050*scale)+'px';
}

// Draw image
function drawImage(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
}

// Colors
const colors=['#FF0000','#00FF00','#0000FF','#FFFF00','#FF00FF','#00FFFF','#FFA500','#800080','#008000','#000080','#FFC0CB','#A52A2A','#808080','#000000','#FFFFFF'];
const paletteDiv=document.getElementById('palette');
colors.forEach(color=>{
    const div=document.createElement('div');
    div.className='color';
    div.style.backgroundColor=color;
    div.onclick=()=>currentColor=color;
    paletteDiv.appendChild(div);
});

// Brush controls
const brushInput=document.getElementById('brushSize');
const brushDisplay=document.getElementById('brushSizeDisplay');
brushInput.oninput=()=>{brushSize=brushInput.value; brushDisplay.textContent=brushSize;}

const opacityInput=document.getElementById('brushOpacity');
const opacityDisplay=document.getElementById('brushOpacityDisplay');
opacityInput.oninput=()=>{brushOpacity=parseFloat(opacityInput.value); opacityDisplay.textContent=brushOpacity;}

// Drawing function
function drawCircle(x,y){
    ctx.save();
    ctx.globalAlpha=brushOpacity;
    ctx.fillStyle=currentColor;
    ctx.beginPath();
    ctx.arc(x,y,brushSize,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
}

// Mouse/Touch
function getMousePos(e){
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width;
    const scaleY=canvas.height/rect.height;
    return {x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY};
}

canvas.addEventListener('mousedown',()=>drawing=true);
canvas.addEventListener('mouseup',()=>drawing=false);
canvas.addEventListener('mouseleave',()=>drawing=false);
canvas.addEventListener('mousemove',e=>{
    if(!drawing) return;
    const pos=getMousePos(e);
    drawCircle(pos.x,pos.y);
});

canvas.addEventListener('touchstart',e=>{
    drawing=true;
    const pos=getMousePos(e.touches[0]);
    drawCircle(pos.x,pos.y);
});
canvas.addEventListener('touchmove',e=>{
    if(!drawing) return;
    const pos=getMousePos(e.touches[0]);
    drawCircle(pos.x,pos.y);
    e.preventDefault();
});
canvas.addEventListener('touchend',()=>drawing=false);

// Clear
document.getElementById('clearBtn').onclick=()=>drawImage();

// Download
document.getElementById('downloadBtn').onclick=()=>{
    const link=document.createElement('a');
    link.download='my_colored_parrot.png';
    link.href=canvas.toDataURL();
    link.click();
}

// YouTube
document.getElementById('seeRealBtn').onclick=()=>window.open('https://youtu.be/5wfhDg661BA','_blank');

// Resize on window
window.addEventListener('resize',()=>{ resizeCanvas(); drawImage(); });
</script>

</body>
</html>
