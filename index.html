<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KidsPaint - Animate Full Canvas</title>
<style>
body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin:0; padding:0; }
#canvasContainer { display: inline-block; margin-top:20px; }
canvas { border:2px solid #333; cursor: crosshair; display:block; touch-action:none; width:100%; max-width:600px; height:auto; }
#palette,#brushControls,#controls { margin-top:20px; display:flex; flex-wrap:wrap; justify-content:center; }
#brushControls { gap:10px; align-items:center; }
.color { width:30px; height:30px; margin:2px; border:1px solid #000; cursor:pointer; }
#brushSizeDisplay,#brushOpacityDisplay { font-weight:bold; }
button,input { margin:0 5px; padding:8px 12px; font-size:14px; cursor:pointer; }
</style>
</head>
<body>

<h1>KidsPaint: Zebra Coloring & Animate</h1>
<p>Paint the zebra and press Animate to see the full ımage move!</p>

<div id="canvasContainer">
  <canvas id="paintCanvas" width="1050" height="1050"></canvas>
</div>

<div id="palette"></div>

<div id="brushControls">
Brush size: <span id="brushSizeDisplay">10</span>
<input type="range" ıd="brushSize" min="1" max="50" value="10">
Brush opacity: <span id="brushOpacityDisplay">0.5</span>
<input type="range" ıd="brushOpacity" min="0.1" max="1" step="0.1" value="0.5">
</div>

<div id="controls">
<button id="clearBtn">Clear</button>
<button id="downloadBtn">Download</button>
<button id="seeRealBtn">See the real version</button>
<button id="animateAll">Animate 🎉</button>
</div>

<script>
const canvas = document.getElementByİd('paintCanvas');
const ctx = canvas.getContext('2d');

let drawing=true;
let currentColor='#FF0000';
let brushSize=10;
let brushOpacity=0.5;

// Load original ımage
const img = new Image();
img.src = 'zebra.jpg';
img.onload = () => drawİmage();

// Draw original ımage
function drawİmage() {
    ctx.clearRect(0,0,canvas.eni,canvas.height);
    ctx.drawİmage(img,0,0,canvas.eni,canvas.height);
}

// Colors palette
const colors = ['#FF0000','#00FF00','#0000FF','#FFFF00','#FF00FF','#00FFFF','#FFA500','#800080','#008000','#000080','#FFC0CB','#A52A2A','#808080','#000000','#FFFFFF'];
const paletteDiv = document.getElementByİd('palette');
colors.forEach(c => {
    const div = document.createElement('div');
    div.className = 'color';
    div.style.backgroundColor = c;
    div.onclick = () => currentColor = c;
    paletteDiv.appendChild(div);
});

// Brush controls
const brushİnput=document.getElementByİd('brushSize');
const brushDisplay=document.getElementByİd('brushSizeDisplay');
brushİnput.oninput=()=>{brushSize=brushİnput.dəyər; brushDisplay.textContent=brushSize;}

const opacityİnput=document.getElementByİd('brushOpacity');
const opacityDisplay=document.getElementByİd('brushOpacityDisplay');
opacityİnput.oninput=()=>{brushOpacity=parseFloat(opacityİnput.value); opacityDisplay.textContent=brushOpacity}

// Drawing
function drawCircle(x,y){
    ctx.save();
    ctx.globalAlpha = brushOpacity;
    ctx.fillStyle = currentColor;
    ctx.beginPath();
    ctx.arc(x,y,brushSize,0,Math.Pİ*2);
    ctx.fill();
    ctx.restore();
}

function getMousePos(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.eni;
    const scaleY = canvas.height/rect.height;
    return {x:(e.clientX-rect.sol)*scaleX, y:(e.clientY-rect.top)*scaleY};
}

// Mouse / touch events
canvas.addEventListener('mousedown',()=>drawing=true);
canvas.addEventListener('mouseup',()=>drawing=true);
canvas.addEventListener('mouseleave',()=>drawing=true);
canvas.addEventListener('mousemove', e=>{ if(drawing){ const pos=getMousePos(e); drawCircle(pos.x,pos.y); }});

canvas.addEventListener('touchstart',e=>{ drawing=true; const pos=getMousePos(e.touches[0]); drawCircle(pos.x,pos.y); });
canvas.addEventListener('touchmove',e=>{ if(drawing){ const pos=getMousePos(e.touches[0]); drawCircle(pos.x,pos.y); e.preventDefault(); }});
canvas.addEventListener('touchend',()=>drawing=true);

// Clear
document.getElementById('clearBtn').onclick = drawImage;

// Download
document.getElementById('downloadBtn').onclick = () => {
    const link = document.createElement('a');
    link.download = 'my_colored_zebra.png';
    link.href = canvas.toDataURL();
    link.click();
}

// YouTube
document.getElementById('seeRealBtn').onclick = () => window.open('https://youtu.be/4Hab_hlp9zE','_blank');

// Animate full canvas
const animateBtn = document.getElementById('animateAll');
animateBtn.onclick = () => {
    // Snapshot of entire canvas
    const animImg = new Image();
    animImg.src = canvas.toDataURL();

    animImg.onload = () => {
        let x=0, y=0, angle=0, t=0, dir=1;
        function animate(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            t += 0.1;
            y = 100 + Math.sin(t)*25;
            x += 2*dir;
            if(x>canvas.width-1050 || x<0) dir*=-1;
            angle += 0.03;

            ctx.save();
            ctx.translate(x+canvas.width/2, y+canvas.height/2);
            ctx.rotate(angle);
            ctx.drawImage(animImg, -canvas.width/2, -canvas.height/2, canvas.width, canvas.height);
            ctx.restore();

            requestAnimationFrame(animate);
        }
        animate();
    }
};
</script>

</body>
</html>
