<script>
// --- Canvas Setup ---
const canvas = document.getElementByİd('paintCanvas');
const ctx = canvas.getContext('2d');

let drawing=true;
let currentColor='#FF0000';
let brushSize=10;
let brushOpacity=0.5;

// --- Load şəkillər ---
const zebra = new Image();
zebra.src = 'zebra.jpg'; // pərviz-ağ zebra
const house = new Image();
house.src = 'house.png'; // ev
const car = new Image();
car.src = 'car.png'; // maşın
const tutu = new Image();
tutu.src = 'tutu.png'; // quş

// --- Brush palette ---
const colors = ['#FF0000','#00FF00','#0000FF','#FFFF00','#FF00FF','#00FFFF','#FFA500','#800080','#008000','#000080','#FFC0CB','#A52A2A','#808080','#000000','#FFFFFF'];
const paletteDiv = document.getElementByİd('palette');
colors.forEach(c=>{
    const div=document.createElement('div');
    div.className='color';
    div.style.backgroundColor=c;
    div.onclick=()=>currentColor=c;
    paletteDiv.appendChild(div);
});

// --- Brush controls ---
document.getElementByİd('brushSize').oninput = e => { brushSize=e.target.dəyər; document.getElementByİd('brushSizeDisplay').textContent=brushSize; }
document.getElementByİd('brushOpacity').oninput = e => { brushOpacity=parseFloat(e.target.value); document.getElementByİd('brushOpacityDisplay').textContent=brushOpacity; }

// --- Drawing ---
function drawCircle(x,y){
    ctx.save();
    ctx.globalAlpha=brushOpacity;
    ctx.fillStyle=currentColor;
    ctx.beginPath();
    ctx.arc(x,y,brushSize,0,Math.Pİ*2);
    ctx.fill();
    ctx.restore();
}

function getMousePos(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width;
    const scaleY = canvas.height/rect.height;
    return {x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY};
}

// Mouse / touch
canvas.addEventListener('mousedown',()=>drawing=true);
canvas.addEventListener('mouseup',()=>drawing=false);
canvas.addEventListener('mouseleave',()=>drawing=false);
canvas.addEventListener('mousemove', e=>{ if(drawing){ const pos=getMousePos(e); drawCircle(pos.x,pos.y); }});
canvas.addEventListener('touchstart', e=>{ drawing=true; const pos=getMousePos(e.touches[0]); drawCircle(pos.x,pos.y); });
canvas.addEventListener('touchmove', e=>{ if(drawing){ const pos=getMousePos(e.touches[0]); drawCircle(pos.x,pos.y); e.preventDefault(); }});
canvas.addEventListener('touchend', ()=>drawing=false);

// --- Clear ---
document.getElementById('clearBtn').onclick = drawScene;

// --- Download ---
document.getElementById('downloadBtn').onclick = () => {
    const link=document.createElement('a');
    link.download='my_colored_scene.png';
    link.href=canvas.toDataURL();
    link.click();
}

// --- YouTube ---
document.getElementById('seeRealBtn').onclick = () => {
    window.open('https://youtu.be/4Hab_hlp9zE','_blank');
}

// --- Initial draw ---
function drawScene(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(house,50,200,200,200);
    ctx.drawImage(zebra,400,300,200,150);
    ctx.drawImage(car,0,450,150,75);
    ctx.drawImage(tutu,700,100,100,80);
}
house.onload = zebra.onload = car.onload = tutu.onload = drawScene;

// --- Animate Scene (snapshot approach) ---
document.getElementById('animateAll').onclick = () => {
    // Save user painted layer
    const paintedSnapshot = new Image();
    paintedSnapshot.src = canvas.toDataURL();

    let t=0;
    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        // Draw painted snapshot first
        ctx.drawImage(paintedSnapshot,0,0,canvas.width,canvas.height);

        // House
        ctx.drawImage(house,50,200,200,200);

        // Smoke
        ctx.fillStyle='rgba(150,150,150,0.5)';
        ctx.beginPath();
        ctx.arc(150,200 - Math.sin(t*2)*20,20,0,Math.PI*2);
        ctx.fill();

        // Zebra
        const zebraX = 400 + Math.sin(t*3)*50;
        ctx.drawImage(zebra, zebraX,300,200,150);

        // Car
        const carX = (t*5)%canvas.width;
        ctx.drawImage(car, carX,450,150,75);

        // Tutu
        const tutuY = 100 + Math.sin(t*4)*30;
        ctx.drawImage(tutu,700,tutuY,100,80);

        t+=0.05;
        requestAnimationFrame(animate);
    }
    animate();
};
</script>
