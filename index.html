// --- Colors ---
// --- Colors --- const=colors=['#FF0000','#]()F00','#0000FF','#FFFF00','#FF00FF','#00FFFF','#FFA500','#800080','#008000','#000080','#FFC0CB','#A52A2A','#808080','#000000','#FFFFFF'];'#FFFF00'const paletteDiv=document.getElementByİd('palette');'#FF00FF'colors.forEach(color=>{'#00FFFF' const div=document.createElement('div');'#FFA500' div.className'#800080','#008000','#000080','#FFC0CB','#A52A2A','#808080','#000000','#FFFFFF'];
const paletteDiv=document.getElementById('palette');
colors.forEach(color=>{
    const div=document.createElement('div');
    div.className='color';
    div.style.backgroundColor=color;
    div.onclick=()=>currentColor=color;
    paletteDiv.appendChild(div);
});

// --- Brush controls ---
const brushInput=document.getElementById('brushSize');
const brushDisplay=document.getElementById('brushSizeDisplay');
brushInput.oninput=()=>{brushSize=brushInput.value; brushDisplay.textContent=brushSize;}

const opacityInput=document.getElementById('brushOpacity');
const opacityDisplay=document.getElementById('brushOpacityDisplay');
opacityInput.oninput=()=>{brushOpacity=parseFloat(opacityInput.value); opacityDisplay.textContent=brushOpacity}

// --- Drawing function ---
function drawCircle(x,y){
    ctx.save();
    ctx.globalAlpha=brushOpacity;
    ctx.fillStyle=currentColor;
    ctx.beginPath();
    ctx.arc(x,y,brushSize,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
}

// --- Adjust mouse/touch coordinates for scale ---
function getMousePos(e){
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width;
    const scaleY=canvas.height/rect.height;
    return {x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY};
}

// --- Mouse events ---
canvas.addEventListener('mousedown',()=>drawing=true);
canvas.addEventListener('mouseup',()=>drawing=false);
canvas.addEventListener('mouseleave',()=>drawing=false);
canvas.addEventListener('mousemove',e=>{
    if(!drawing) return;
    const pos=getMousePos(e);
    drawCircle(pos.x,pos.y);
});

// --- Touch events ---
canvas.addEventListener('touchstart',e=>{
    drawing=true;
    const pos=getMousePos(e.touches[0]);
    drawCircle(pos.x,pos.y);
});
canvas.addEventListener('touchmove',e=>{
    if(!drawing) return;
    const pos=getMousePos(e.touches[0]);
    drawCircle(pos.x,pos.y);
    e.preventDefault();
});
canvas.addEventListener('touchend',()=>drawing=false);

// --- Clear ---
document.getElementById('clearBtn').onclick=()=>drawImage();

// --- Download ---
document.getElementById('downloadBtn').onclick=()=>{
    const link=document.createElement('a');
    link.download='my_colored_parrot.png';
    link.href=canvas.toDataURL();
    link.click();
}

// --- YouTube ---
document.getElementById('seeRealBtn').onclick=()=>window.open('https://youtu.be/4Hab_hlp9zE', '_blank');

// --- Resize on window ---
window.addEventListener('resize',()=>{
    resizeCanvas();
    drawImage();
});

// --- Animate function ---
const animateBtn = document.getElementById("animateAll");
let animImg = new Image();
let animating = false;

animateBtn.onclick = () => {
    if(animating) return; // prevent multiple clicks
    animImg.src = canvas.toDataURL();
    animImg.onload = () => {
        animating = true;
        let x = 100;
        let y = 100;
        let angle = 0;
        let t = 0;
        let dir = 1;

        function animate(){
            ctx.clearRect(0,0,canvas.width,canvas.height);

            t += 0.1;
            y = 100 + Math.sin(t)*25;       // tullanma
            x += 2*dir;                      // sağ-sol
            if(x>canvas.width-300 || x<0) dir*=-1;
            angle += 0.05;                    // fırlanma

            ctx.save();
            ctx.translate(x+150, y+150);
            ctx.rotate(angle);
            ctx.drawImage(animImg, -150, -150, 300, 300); // animasiya ölçüsü
            ctx.restore();

            requestAnimationFrame(animate);
        }
        animate();
    };
};
